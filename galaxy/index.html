<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mô Phỏng Thiên Hà · Newtonian N-Body</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Be+Vietnam+Pro:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04060c;
    --cyan: #7ee0ff;
    --cyan-dim: rgba(126, 224, 255, 0.16);
    --amber: #ffb35c;
    --text: #c9d6e8;
    --text-dim: #5b6b85;
    --panel-bg: rgba(8, 12, 24, 0.62);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    user-select: none;
  }
  canvas { position: fixed; inset: 0; display: block; }
  #sim.armed { cursor: crosshair; }

  /* ---- HUD layers ---- */
  .hud { position: fixed; z-index: 10; pointer-events: none; }

  header.hud {
    top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 22px 28px;
  }
  .title h1 {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700; font-size: 22px;
    letter-spacing: 0.22em; color: #eef6ff;
  }
  .title h1 .slash { color: var(--cyan); font-weight: 500; }
  .title .sub {
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.14em;
    color: var(--text-dim);
  }
  .readouts {
    display: flex; gap: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em;
    border: 1px solid var(--cyan-dim);
    background: var(--panel-bg);
    backdrop-filter: blur(10px);
  }
  .readouts .cell {
    padding: 8px 16px;
    border-left: 1px solid var(--cyan-dim);
    text-align: right;
  }
  .readouts .cell:first-child { border-left: none; }
  .readouts .lbl { color: var(--text-dim); font-size: 9px; display: block; margin-bottom: 2px; }
  .readouts b { color: var(--cyan); font-weight: 700; font-size: 14px; }
  .readouts #fps.warn { color: var(--amber); }

  /* ---- Control panel ---- */
  aside.hud {
    left: 28px; bottom: 28px;
    width: 308px;
    pointer-events: auto;
    background: var(--panel-bg);
    backdrop-filter: blur(14px);
    border: 1px solid var(--cyan-dim);
    padding: 18px 20px 16px;
  }
  /* corner brackets */
  aside.hud::before, aside.hud::after {
    content: ''; position: absolute; width: 14px; height: 14px;
    border: 1px solid var(--cyan);
  }
  aside.hud::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  aside.hud::after  { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  aside h2 {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.3em;
    color: var(--cyan); margin-bottom: 16px;
  }
  .ctrl { margin-bottom: 14px; }
  .ctrl label {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    margin-bottom: 7px;
  }
  .ctrl label .en { color: var(--text-dim); font-size: 10px; font-weight: 400; }
  .ctrl output {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--amber);
  }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 18px; background: transparent; cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), rgba(126,224,255,0.12));
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 13px; height: 13px; margin-top: -5.5px;
    background: var(--cyan);
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    box-shadow: 0 0 10px rgba(126,224,255,0.8);
  }
  input[type=range]::-moz-range-track {
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), rgba(126,224,255,0.12));
  }
  input[type=range]::-moz-range-thumb {
    width: 13px; height: 13px; border: none;
    background: var(--cyan);
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
  }

  .legend { margin: 2px 0 16px; }
  .legend .bar {
    height: 5px;
    background: linear-gradient(90deg, #c83c28, #ff9636, #ffe1aa, #ebf5ff, #96beff);
  }
  .legend .cap {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--text-dim);
    letter-spacing: 0.08em; margin-top: 4px;
  }

  .btns { display: flex; gap: 8px; margin-top: 4px; }
  button {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    color: var(--cyan);
    background: rgba(126,224,255,0.07);
    border: 1px solid rgba(126,224,255,0.35);
    padding: 10px 12px; cursor: pointer;
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
    transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
  }
  button:hover { background: rgba(126,224,255,0.18); box-shadow: 0 0 14px rgba(126,224,255,0.25); }
  #dropBtn { flex: 1; }
  #dropBtn.armed {
    color: #1a0f00; background: var(--amber); border-color: var(--amber);
    box-shadow: 0 0 18px rgba(255,179,92,0.55);
    animation: pulse 1.1s ease-in-out infinite;
  }
  #dropBtn:disabled {
    opacity: 0.35; cursor: not-allowed; box-shadow: none;
    background: rgba(126,224,255,0.07);
  }
  @keyframes pulse { 50% { box-shadow: 0 0 30px rgba(255,179,92,0.85); } }

  .hint {
    margin-top: 12px;
    font-size: 10.5px; line-height: 1.5;
    color: var(--text-dim);
    border-top: 1px solid rgba(126,224,255,0.1);
    padding-top: 10px;
    min-height: 28px;
  }
  .hint.armed { color: var(--amber); }
  kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
    border: 1px solid var(--text-dim); border-radius: 3px;
    padding: 0 4px; color: var(--text);
  }

  footer.hud {
    right: 28px; bottom: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--text-dim); text-align: right; line-height: 1.7;
  }
  footer .formula { color: rgba(126,224,255,0.55); }

  #pausedTag {
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Chakra Petch', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.5em;
    color: var(--amber);
    border: 1px solid rgba(255,179,92,0.5);
    padding: 10px 26px 10px 32px;
    background: rgba(8,12,24,0.7);
    display: none;
  }
  #pausedTag.show { display: block; }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="sim"></canvas>

<header class="hud">
  <div class="title">
    <h1>MÔ PHỎNG THIÊN HÀ <span class="slash">//</span></h1>
    <div class="sub">NEWTONIAN N-BODY &middot; CANVAS 2D &middot; 60 FPS TARGET</div>
  </div>
  <div class="readouts">
    <div class="cell"><span class="lbl">FPS</span><b id="fps">--</b></div>
    <div class="cell"><span class="lbl">SỐ SAO</span><b id="starCt">0</b></div>
    <div class="cell"><span class="lbl">HỐ ĐEN</span><b id="bhCt">1</b></div>
  </div>
</header>

<aside class="hud">
  <h2>BẢNG ĐIỀU KHIỂN</h2>

  <div class="ctrl">
    <label>Khối lượng hố đen <span class="en">mass</span> <output id="massVal"></output></label>
    <input type="range" id="mass" min="1" max="20" step="0.1" value="4">
  </div>

  <div class="ctrl">
    <label>Số lượng sao <span class="en">stars</span> <output id="countVal"></output></label>
    <input type="range" id="count" min="1000" max="30000" step="500" value="20000">
  </div>

  <div class="legend">
    <div class="bar"></div>
    <div class="cap"><span>CHẬM</span><span>VẬN TỐC &rarr; MÀU SAO</span><span>NHANH</span></div>
  </div>

  <div class="btns">
    <button id="dropBtn">&#9678; THẢ HỐ ĐEN THỨ 2</button>
    <button id="resetBtn">&#8634; RESET</button>
  </div>

  <p class="hint" id="hint"></p>
</aside>

<footer class="hud">
  <div class="formula">F = G&middot;M&middot;m / r&sup2;</div>
  <div>semi-implicit euler &middot; softened potential &middot; additive trails</div>
</footer>

<div class="hud" id="pausedTag">TẠM DỪNG</div>

<script>
'use strict';
(() => {

// ============================== Setup ==============================
const simCv = document.getElementById('sim');
const bgCv  = document.getElementById('bg');
const ctx   = simCv.getContext('2d');
const bgx   = bgCv.getContext('2d', { alpha: false });

let W = 0, H = 0;

// ============================== State ==============================
const MAXN  = 46000;                 // 30k slider max + companion galaxies
const px = new Float32Array(MAXN);
const py = new Float32Array(MAXN);
const vx = new Float32Array(MAXN);
const vy = new Float32Array(MAXN);
let active = 0;

const GM_UNIT  = 150;                // slider unit (10^6 M☉) -> GM in px³/frame²
const SOFT2    = 90;                 // softening² (px²): keeps F finite at r->0
const SOFT2_BH = 500;                // larger softening between black holes
const MAX_BH   = 4;
const TRAIL    = 0.18;               // per-frame alpha removed -> trail length

const bhs = [];                      // {x, y, vx, vy, gm, dir}
const pulses = [];                   // merge shockwave rings

let armed = false, paused = false;
let dragging = false, dragSX = 0, dragSY = 0, dragX = 0, dragY = 0;

// ---- velocity -> color buckets (counting sort, 1 fillStyle per bucket) ----
const NB = 48;
const bidx   = new Uint8Array(MAXN);
const counts = new Int32Array(NB);
const offs   = new Int32Array(NB);
const order  = new Int32Array(MAXN);
let invVTop  = 1;                    // 1 / max expected speed, tracks BH mass

// Stellar temperature palette: slow = red dwarf, fast = blue-hot
const PAL = (() => {
  const stops = [
    [0.00, 200,  60,  40, 0.34],
    [0.30, 255, 150,  60, 0.42],
    [0.55, 255, 225, 170, 0.52],
    [0.75, 235, 245, 255, 0.62],
    [1.00, 150, 190, 255, 0.85],
  ];
  const out = [];
  for (let i = 0; i < NB; i++) {
    const t = i / (NB - 1);
    let a = stops[0], b = stops[stops.length - 1];
    for (let s = 0; s < stops.length - 1; s++)
      if (t >= stops[s][0] && t <= stops[s + 1][0]) { a = stops[s]; b = stops[s + 1]; break; }
    const f = (t - a[0]) / (b[0] - a[0] || 1);
    const mix = (i1, i2) => Math.round(a[i1] + (b[i1] - a[i1]) * f);
    out.push(`rgba(${mix(1)},${mix(2)},${mix(3)},${(a[4] + (b[4] - a[4]) * f).toFixed(2)})`);
  }
  return out;
})();

// ============================== DOM refs ==============================
const $ = id => document.getElementById(id);
const massEl = $('mass'), countEl = $('count');
const massVal = $('massVal'), countVal = $('countVal');
const fpsEl = $('fps'), starCtEl = $('starCt'), bhCtEl = $('bhCt');
const dropBtn = $('dropBtn'), resetBtn = $('resetBtn');
const hintEl = $('hint'), pausedTag = $('pausedTag');

const viNum = n => n.toLocaleString('vi-VN');
const HINT_IDLE  = 'Nhấn <kbd>Space</kbd> để tạm dừng. Kéo slider ngay khi đang chạy, quỹ đạo sẽ tự thích nghi theo lực hấp dẫn mới.';
const HINT_ARMED = 'Click vào vũ trụ để thả hố đen kèm thiên hà vệ tinh. Giữ chuột và kéo để ném nó theo hướng đó.';
const HINT_FULL  = 'Đã đạt giới hạn 4 hố đen. Nhấn RESET để bắt đầu lại.';

// ============================== Galaxy spawning ==============================
const gauss = () => (Math.random() + Math.random() + Math.random()) - 1.5;

// Disk of stars on near-circular orbits around `bh`, seeded with 3 log-spiral arms
function spawnDisk(bh, n, rMax) {
  const rMin = 13;
  const end = Math.min(active + n, MAXN);
  for (let i = active; i < end; i++) {
    const r = rMin + Math.pow(Math.random(), 1.7) * (rMax - rMin);
    let th;
    if (Math.random() < 0.55) {
      th = ((Math.random() * 3) | 0) * (Math.PI * 2 / 3)
         + Math.log(r / rMin) * 2.4 + gauss() * 0.26;
    } else {
      th = Math.random() * Math.PI * 2;
    }
    const cos = Math.cos(th), sin = Math.sin(th);
    px[i] = bh.x + cos * r;
    py[i] = bh.y + sin * r;
    const v = Math.sqrt(bh.gm / r) * (0.93 + Math.random() * 0.13) * bh.dir;
    vx[i] = -sin * v + bh.vx;
    vy[i] =  cos * v + bh.vy;
  }
  active = end;
}

function diskRadius(k) { return k === 0 ? Math.min(W, H) * 0.42 : Math.min(W, H) * 0.26; }

function syncStarCount() {
  const target = +countEl.value + extraStars();
  if (target > active) {
    // top-up around hosts, mass-weighted
    let need = Math.min(target, MAXN) - active;
    const gmSum = bhs.reduce((s, b) => s + b.gm, 0);
    for (let k = 0; k < bhs.length && need > 0; k++) {
      const cnt = k === bhs.length - 1 ? need
        : Math.min(need, Math.max(1, Math.round(need * bhs[k].gm / gmSum)));
      const before = active;
      spawnDisk(bhs[k], cnt, diskRadius(k));
      need -= (active - before);
    }
  } else if (target < active) {
    active = target;
  }
  starCtEl.textContent = viNum(active);
}
let companionStars = 0;              // stars belonging to dropped galaxies
function extraStars() { return companionStars; }

// ============================== Black holes ==============================
function bhRadius(bh) { return 5 + 3 * Math.sqrt(bh.gm / GM_UNIT); }

function primaryGM() { return +massEl.value * GM_UNIT; }

function refreshVScale() {
  // top of the color scale ~ orbital speed at r=25px, so mid-disk stars
  // already reach the white/blue half of the palette
  invVTop = 1 / (1.15 * Math.sqrt(bhs[0].gm / 25));
}

function dropBlackHole(x, y, dvx, dvy) {
  const gm = primaryGM();
  const bh = { x, y, vx: dvx, vy: dvy, gm, dir: Math.random() < 0.5 ? 1 : -1 };
  bhs.push(bh);
  const n = Math.min(Math.round(+countEl.value * 0.5), MAXN - active);
  companionStars += n;
  spawnDisk(bh, n, Math.min(W, H) * 0.26);
  starCtEl.textContent = viNum(active);
  bhCtEl.textContent = bhs.length;
  if (bhs.length >= MAX_BH) { dropBtn.disabled = true; setHint(HINT_FULL); }
}

function mergeBH(i, j) {
  const a = bhs[i], b = bhs[j];
  const m = a.gm + b.gm;
  a.x  = (a.x * a.gm + b.x * b.gm) / m;
  a.y  = (a.y * a.gm + b.y * b.gm) / m;
  a.vx = (a.vx * a.gm + b.vx * b.gm) / m;   // momentum conserved (gm as mass proxy)
  a.vy = (a.vy * a.gm + b.vy * b.gm) / m;
  a.gm = m;
  bhs.splice(j, 1);
  pulses.push({ x: a.x, y: a.y, r: bhRadius(a) * 2, alpha: 0.9 });
  bhCtEl.textContent = bhs.length;
  if (bhs.length < MAX_BH && !armed) dropBtn.disabled = false;
  if (i === 0) refreshVScale();
}

// ============================== Physics ==============================
const bxL = new Float64Array(MAX_BH), byL = new Float64Array(MAX_BH), bgmL = new Float64Array(MAX_BH);

const m2 = (a, b) => a.gm + b.gm;

function step(dt) {
  const nb = bhs.length;

  // --- black hole pairwise gravity + merge check ---
  for (let i = 0; i < nb; i++) {
    for (let j = i + 1; j < nb; j++) {
      const A = bhs[i], B = bhs[j];
      const dx = B.x - A.x, dy = B.y - A.y;
      const r2 = dx * dx + dy * dy;
      if (r2 < Math.pow((bhRadius(A) + bhRadius(B)) * 0.8, 2)) { mergeBH(i, j); return step(dt); }
      const inv = 1 / Math.sqrt(r2 + SOFT2_BH);
      const s = inv * inv * inv;
      A.vx += dx * B.gm * s * dt;  A.vy += dy * B.gm * s * dt;
      B.vx -= dx * A.gm * s * dt;  B.vy -= dy * A.gm * s * dt;
      // dynamical friction (Chandrasekhar): pure Newton never decays an
      // orbit, so without this the galaxies would waltz forever
      if (r2 < 250000) {
        const f = 1 - 0.0035 * dt;
        const mvx = (A.vx * A.gm + B.vx * B.gm) / m2(A, B);
        const mvy = (A.vy * A.gm + B.vy * B.gm) / m2(A, B);
        A.vx = mvx + (A.vx - mvx) * f;  A.vy = mvy + (A.vy - mvy) * f;
        B.vx = mvx + (B.vx - mvx) * f;  B.vy = mvy + (B.vy - mvy) * f;
      }
    }
  }
  // gentle camera ease: keep the mass centroid near screen center so the
  // system never drifts out of view (uniform translation, no fake forces)
  let cgx = 0, cgy = 0, gsum = 0;
  for (let i = 0; i < nb; i++) { cgx += bhs[i].x * bhs[i].gm; cgy += bhs[i].y * bhs[i].gm; gsum += bhs[i].gm; }
  const shx = (W / 2 - cgx / gsum) * 0.004 * dt;
  const shy = (H / 2 - cgy / gsum) * 0.004 * dt;

  for (let i = 0; i < nb; i++) {
    const b = bhs[i];
    b.x += b.vx * dt + shx;  b.y += b.vy * dt + shy;
    bxL[i] = b.x;  byL[i] = b.y;  bgmL[i] = b.gm;
  }

  // --- stars: gravity from every black hole (Newton, softened) ---
  const farR2 = Math.pow(Math.max(W, H) * 2.2, 2);
  const vScale = invVTop * (NB - 1);
  for (let i = 0; i < active; i++) {
    let ax = 0, ay = 0, r2min = Infinity;
    const x = px[i], y = py[i];
    for (let k = 0; k < nb; k++) {
      const dx = bxL[k] - x, dy = byL[k] - y;
      const r2 = dx * dx + dy * dy;
      if (r2 < r2min) r2min = r2;
      const inv = 1 / Math.sqrt(r2 + SOFT2);
      const s = bgmL[k] * inv * inv * inv;       // GM / (r²+ε²)^(3/2)
      ax += dx * s;  ay += dy * s;
    }
    let nvx = vx[i] + ax * dt;
    let nvy = vy[i] + ay * dt;

    // recycle escapees into a fresh orbit so the galaxy stays dense
    if (r2min > farR2) {
      const host = bhs[(Math.random() * nb) | 0];
      const r = 13 + Math.pow(Math.random(), 1.5) * Math.min(W, H) * 0.33;
      const th = Math.random() * Math.PI * 2;
      const cos = Math.cos(th), sin = Math.sin(th);
      px[i] = host.x + cos * r;  py[i] = host.y + sin * r;
      const v = Math.sqrt(host.gm / r) * host.dir;
      nvx = -sin * v + host.vx;  nvy = cos * v + host.vy;
    } else {
      px[i] = x + nvx * dt + shx;
      py[i] = y + nvy * dt + shy;
    }
    vx[i] = nvx;  vy[i] = nvy;

    // color bucket from speed (sqrt curve spreads the palette nicely)
    let b = (Math.sqrt(Math.sqrt(nvx * nvx + nvy * nvy) * invVTop) * vScale) | 0;
    bidx[i] = b > NB - 1 ? NB - 1 : b;
  }
}

// ============================== Render ==============================
function render() {
  // fade previous frame -> light trails (destination-out fully decays to 0)
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = `rgba(0,0,0,${TRAIL})`;
  ctx.fillRect(0, 0, W, H);

  // counting sort stars by color bucket
  counts.fill(0);
  for (let i = 0; i < active; i++) counts[bidx[i]]++;
  let off = 0;
  for (let b = 0; b < NB; b++) { offs[b] = off; off += counts[b]; }
  for (let i = 0; i < active; i++) order[offs[bidx[i]]++] = i;

  ctx.globalCompositeOperation = 'lighter';
  for (let b = 0; b < NB; b++) {
    const end = offs[b], start = end - counts[b];
    if (start === end) continue;
    ctx.fillStyle = PAL[b];
    const size = b >= 42 ? 3 : 2;
    for (let k = start; k < end; k++) {
      const i = order[k];
      ctx.fillRect(px[i] | 0, py[i] | 0, size, size);
    }
  }

  // black holes: accretion glow + photon ring + event horizon
  for (let k = 0; k < bhs.length; k++) {
    const b = bhs[k], rs = bhRadius(b);
    const g = ctx.createRadialGradient(b.x, b.y, rs * 0.6, b.x, b.y, rs * 7);
    g.addColorStop(0,    'rgba(255,190,110,0.55)');
    g.addColorStop(0.25, 'rgba(255,140,60,0.22)');
    g.addColorStop(0.6,  'rgba(120,90,255,0.06)');
    g.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(b.x, b.y, rs * 7, 0, 7); ctx.fill();

    ctx.globalCompositeOperation = 'source-over';
    ctx.beginPath(); ctx.arc(b.x, b.y, rs * 1.45, 0, 7);
    ctx.strokeStyle = 'rgba(255,210,150,0.9)'; ctx.lineWidth = 1.4; ctx.stroke();
    ctx.beginPath(); ctx.arc(b.x, b.y, rs, 0, 7);
    ctx.fillStyle = '#000'; ctx.fill();
    ctx.globalCompositeOperation = 'lighter';
  }

  // merge shockwaves
  for (let p = pulses.length - 1; p >= 0; p--) {
    const pu = pulses[p];
    ctx.beginPath(); ctx.arc(pu.x, pu.y, pu.r, 0, 7);
    ctx.strokeStyle = `rgba(255,220,170,${pu.alpha.toFixed(3)})`;
    ctx.lineWidth = 2; ctx.stroke();
    pu.r += 7; pu.alpha *= 0.9;
    if (pu.alpha < 0.02) pulses.splice(p, 1);
  }

  // aim arrow while dragging a new black hole in
  if (dragging) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = 'rgba(255,179,92,0.9)';
    ctx.fillStyle = 'rgba(255,179,92,0.9)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 5]);
    ctx.beginPath(); ctx.moveTo(dragSX, dragSY); ctx.lineTo(dragX, dragY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(dragSX, dragSY, 9, 0, 7); ctx.stroke();
    const ang = Math.atan2(dragY - dragSY, dragX - dragSX);
    ctx.beginPath();
    ctx.moveTo(dragX, dragY);
    ctx.lineTo(dragX - 11 * Math.cos(ang - 0.42), dragY - 11 * Math.sin(ang - 0.42));
    ctx.lineTo(dragX - 11 * Math.cos(ang + 0.42), dragY - 11 * Math.sin(ang + 0.42));
    ctx.fill();
  }
}

// ============================== Background (static, drawn once) ==============================
function paintBackground() {
  bgx.fillStyle = '#04060c';
  bgx.fillRect(0, 0, W, H);
  const neb = [
    [W * 0.78, H * 0.22, Math.min(W, H) * 0.5, 'rgba(20, 36, 80, 0.55)'],
    [W * 0.15, H * 0.8,  Math.min(W, H) * 0.45, 'rgba(40, 18, 64, 0.5)'],
    [W * 0.5,  H * 0.5,  Math.min(W, H) * 0.8, 'rgba(10, 18, 38, 0.6)'],
  ];
  for (const [x, y, r, c] of neb) {
    const g = bgx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, c); g.addColorStop(1, 'rgba(0,0,0,0)');
    bgx.fillStyle = g;
    bgx.fillRect(0, 0, W, H);
  }
  for (let i = 0; i < 700; i++) {
    const a = Math.random();
    bgx.fillStyle = `rgba(${200 + (Math.random() * 55) | 0},${210 + (Math.random() * 45) | 0},255,${(0.08 + a * a * 0.5).toFixed(2)})`;
    bgx.fillRect(Math.random() * W, Math.random() * H, a > 0.93 ? 2 : 1, a > 0.93 ? 2 : 1);
  }
}

// ============================== Main loop ==============================
let last = performance.now(), frames = 0, fpsTimer = last;
let perfStep = 0, perfRender = 0, perfN = 0;
window.__perf = () => { const r = { step: perfStep / perfN, render: perfRender / perfN, n: perfN }; perfStep = perfRender = perfN = 0; return r; };

function loop(t) {
  requestAnimationFrame(loop);
  let dt = (t - last) / 16.6667;          // dt in "frames @60fps"
  last = t;
  if (dt > 2.5) dt = 2.5;                 // tab-switch protection

  if (!paused) {
    const t0 = performance.now();
    if (dt > 1.4) { step(dt / 2); step(dt / 2); }   // substep for stability
    else step(dt);
    const t1 = performance.now();
    render();
    const t2 = performance.now();
    perfStep += t1 - t0; perfRender += t2 - t1; perfN++;
  } else if (dragging) {
    render();
  }

  frames++;
  if (t - fpsTimer >= 500) {
    const fps = Math.round(frames * 1000 / (t - fpsTimer));
    fpsEl.textContent = fps;
    fpsEl.classList.toggle('warn', fps < 50);
    window.__fps = fps;                   // exposed for testing
    frames = 0; fpsTimer = t;
  }
}

// ============================== Init / Reset ==============================
function reset() {
  active = 0;
  companionStars = 0;
  bhs.length = 0;
  pulses.length = 0;
  bhs.push({ x: W / 2, y: H / 2, vx: 0, vy: 0, gm: primaryGM(), dir: 1 });
  refreshVScale();
  spawnDisk(bhs[0], +countEl.value, diskRadius(0));
  ctx.clearRect(0, 0, W, H);
  starCtEl.textContent = viNum(active);
  bhCtEl.textContent = '1';
  disarm();
  dropBtn.disabled = false;
  window.__active = () => active;
  window.__bhs = bhs;
}

function resize() {
  W = simCv.width = bgCv.width = window.innerWidth;
  H = simCv.height = bgCv.height = window.innerHeight;
  paintBackground();
}

// ============================== UI wiring ==============================
function setHint(html, cls) {
  hintEl.innerHTML = html;
  hintEl.className = 'hint' + (cls ? ' ' + cls : '');
}
function arm() {
  armed = true;
  simCv.classList.add('armed');
  dropBtn.classList.add('armed');
  setHint(HINT_ARMED, 'armed');
}
function disarm() {
  armed = false; dragging = false;
  simCv.classList.remove('armed');
  dropBtn.classList.remove('armed');
  setHint(bhs.length >= MAX_BH ? HINT_FULL : HINT_IDLE);
}

massEl.addEventListener('input', () => {
  massVal.textContent = (+massEl.value).toLocaleString('vi-VN', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ×10⁶ M☉';
  if (bhs.length) { bhs[0].gm = primaryGM(); refreshVScale(); }
});
countEl.addEventListener('input', () => {
  countVal.textContent = viNum(+countEl.value);
  syncStarCount();
});

dropBtn.addEventListener('click', () => {
  if (bhs.length >= MAX_BH) return;
  armed ? disarm() : arm();
});
resetBtn.addEventListener('click', reset);

simCv.addEventListener('pointerdown', e => {
  if (!armed) return;
  dragging = true;
  dragSX = dragX = e.clientX;
  dragSY = dragY = e.clientY;
  simCv.setPointerCapture(e.pointerId);
});
simCv.addEventListener('pointermove', e => {
  if (dragging) { dragX = e.clientX; dragY = e.clientY; }
});
simCv.addEventListener('pointerup', e => {
  if (!dragging) return;
  dragging = false;
  const dx = e.clientX - dragSX, dy = e.clientY - dragSY;
  const len = Math.hypot(dx, dy);
  let dvx, dvy;
  if (len < 8) {
    // plain click: gentle decaying orbit around the primary -> guaranteed collision
    const p = bhs[0];
    const rx = dragSX - p.x, ry = dragSY - p.y;
    const r = Math.hypot(rx, ry) || 1;
    const v = Math.sqrt(p.gm / r) * 0.65;
    dvx = -ry / r * v + p.vx;
    dvy =  rx / r * v + p.vy;
  } else {
    dvx = dx * 0.006; dvy = dy * 0.006;
    // cap below escape velocity so a hard throw cannot eject the new
    // galaxy (and its stars) out of the system forever
    const gmSum = bhs.reduce((s, b) => s + b.gm, 0) + primaryGM();
    const rC = Math.hypot(dragSX - bhs[0].x, dragSY - bhs[0].y) || 1;
    const vEsc = Math.sqrt(2 * gmSum / rC);
    const sp = Math.hypot(dvx, dvy);
    if (sp > vEsc * 0.9) { dvx *= vEsc * 0.9 / sp; dvy *= vEsc * 0.9 / sp; }
  }
  dropBlackHole(dragSX, dragSY, dvx, dvy);
  disarm();
  if (bhs.length >= MAX_BH) { dropBtn.disabled = true; setHint(HINT_FULL); }
});

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    paused = !paused;
    pausedTag.classList.toggle('show', paused);
  }
});
window.addEventListener('resize', resize);

// ============================== Go ==============================
massEl.dispatchEvent(new Event('input'));
countVal.textContent = viNum(+countEl.value);
resize();
reset();
requestAnimationFrame(t => { last = t; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
